<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Panel Admin - Edit Profil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">
    <div class="container" style="max-width: 600px;">
        <div class="card shadow-sm">
            <div class="card-body">
                <h3 class="mb-4">Update Profil & Foto</h3>
                
                <form action="{{ url_for('edit_profil') }}" method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label class="form-label">Nama</label>
                        <input type="text" name="nama" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Profesi</label>
                        <input type="text" name="profesi" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Bio Singkat</label>
                        <textarea name="bio" class="form-control" rows="3" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Foto Profil Baru (Biarkan kosong jika tidak ingin ganti)</label>
                        <input type="file" name="foto" class="form-control" accept="image/*">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Simpan Perubahan</button>
                </form>
                
            </div>
        </div>
    </div>
</body>
</html>
