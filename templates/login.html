<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">
    <div class="container" style="max-width: 400px; margin-top: 100px;">
        <div class="card shadow-sm border-0">
            <div class="card-body text-center p-4">
                <h4 class="mb-4 text-dark">Otorisasi Admin</h4>
                <form action="/login" method="POST">
                    <input type="password" name="password" class="form-control mb-3" placeholder="Masukkan Password" required>
                    <button type="submit" class="btn btn-dark w-100">Masuk</button>
                </form>
                <a href="/" class="text-muted d-block mt-3" style="text-decoration: none; font-size: 0.9em;">Kembali ke Halaman Utama</a>
            </div>
        </div>
    </div>
</body>
</html>
